kind = "web"
previewPath = "/"
title = "NoteCanAI"
version = "1.0.0"
id = "artifacts/notecanai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21299

[services.development]
run = "pnpm --filter @workspace/notecanai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/notecanai", "run", "build" ]
publicDir = "artifacts/notecanai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21299"
BASE_PATH = "/"
